<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考核準則 - 聖公會李炳中學體育科</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .liping-blue { background-color: #003366; }
        .liping-border { border-color: #d32f2f; }
        .grade-badge { background-color: #f1f5f9; color: #475569; }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <nav class="liping-blue text-white shadow-xl sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center">
            <div class="flex items-center gap-3 mb-4 md:mb-0">
                <div class="bg-white p-1 rounded-full text-blue-900 font-bold w-10 h-10 flex items-center justify-center">LP</div>
                <div>
                    <h1 class="text-lg font-bold leading-none">聖公會李炳中學</h1>
                    <p class="text-xs opacity-80 italic">體育科 PE Department</p>
                </div>
            </div>
            <ul class="flex space-x-6">
                <li><a href="index.html" class="text-blue-200 hover:text-white transition">最新資訊</a></li>
                <li><a href="resources.html" class="text-blue-200 hover:text-white transition">學習資源</a></li>
                <li><a href="criteria.html" class="font-bold border-b-2 border-white pb-1">考核準則</a></li>
            </ul>
        </div>
    </nav>

    <header class="bg-white border-b-4 liping-border py-12 mb-10">
        <div class="container mx-auto px-4">
            <h2 class="text-3xl font-extrabold text-slate-800">🏆 體育科各項目考核準則 <span class="text-blue-600">Assessment Criteria</span></h2>
            <p class="mt-2 text-slate-500">了解各體育項目的考核要求及評分標準。</p>
        </div>
    </header>

    <main class="container mx-auto px-4 pb-20">
        <div id="criteria-container" class="grid grid-cols-1 gap-8">
            <div class="text-center py-10">
                <div class="animate-spin inline-block w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full mb-4"></div>
                <p class="text-gray-400">正在同步考核數據...</p>
            </div>
        </div>
    </main>

    <footer class="bg-slate-800 text-white py-8">
        <div class="container mx-auto px-4 text-center">
            <p class="font-bold mb-2">聖公會李炳中學 S.K.H. Li Ping Secondary School</p>
            <p class="text-sm opacity-60">取生命的水喝 | I Seek, I Act</p>
        </div>
    </footer>

    <script>
        const SPREADSHEET_ID = '2PACX-1vS-_qE6XPHlEI2czLW37um9rnlWHC76xeYM9GTeDai2IWzHdS9LKW-iQVrxUKqhV0uxC4hzYvZXTChX';
        const GID = '1651800767'; 

        const url = `https://docs.google.com/spreadsheets/d/e/${SPREADSHEET_ID}/pub?gid=${GID}&single=true&output=csv`;

        fetch(url)
            .then(res => res.text())
            .then(csvText => {
                const container = document.getElementById('criteria-container');
                container.innerHTML = '';

                const lines = csvText.split('\n');
                if (lines.length <= 1) {
                    container.innerHTML = '<p class="text-center text-gray-400">目前暫無考核準則數據。</p>';
                    return;
                }

                // Header mapping based on user description:
                // Grade, Title, Icon, Description, BoyHeader, GirlHeader, 
                // Rank1_Score, Rank1_Boy, Rank1_Girl, 
                // Rank2_Score, Rank2_Boy, Rank2_Girl, 
                // Rank3_Score, Rank3_Boy, Rank3_Girl, 
                // Rank4_Score, Rank4_Boy, Rank4_Girl

                for (let i = 1; i < lines.length; i++) {
                    if (lines[i].trim() === '') continue;
                    const cols = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim());
                    
                    const item = {
                        grade: cols[0],
                        title: cols[1],
                        icon: cols[2] || 'fa-person-running',
                        description: cols[3],
                        boyHeader: cols[4] || '男生',
                        girlHeader: cols[5] || '女生',
                        ranks: [
                            { score: cols[6], boy: cols[7], girl: cols[8] },
                            { score: cols[9], boy: cols[10], girl: cols[11] },
                            { score: cols[12], boy: cols[13], girl: cols[14] },
                            { score: cols[15], boy: cols[16], girl: cols[17] }
                        ]
                    };

                    container.innerHTML += `
                        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                            <div class="p-6 md:p-8">
                                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
                                    <div class="flex items-center gap-4">
                                        <div class="w-12 h-12 liping-blue text-white rounded-xl flex items-center justify-center text-2xl shadow-lg">
                                            <i class="fa-solid ${item.icon}"></i>
                                        </div>
                                        <div>
                                            <div class="flex items-center gap-2 mb-1">
                                                <span class="grade-badge text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-wider">${item.grade}</span>
                                                <h3 class="text-xl font-bold text-gray-800">${item.title}</h3>
                                            </div>
                                            <p class="text-gray-500 text-sm">${item.description}</p>
                                        </div>
                                    </div>
                                </div>

                                <div class="overflow-x-auto">
                                    <table class="w-full text-left border-collapse">
                                        <thead>
                                            <tr class="border-b-2 border-gray-100">
                                                <th class="py-3 px-4 text-sm font-bold text-gray-400 uppercase">分數</th>
                                                <th class="py-3 px-4 text-sm font-bold text-blue-600 uppercase">${item.boyHeader}</th>
                                                <th class="py-3 px-4 text-sm font-bold text-rose-500 uppercase">${item.girlHeader}</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            ${item.ranks.map(rank => rank.score ? `
                                                <tr class="border-b border-gray-50 hover:bg-gray-50 transition">
                                                    <td class="py-4 px-4 font-bold text-gray-700">${rank.score}</td>
                                                    <td class="py-4 px-4 text-gray-600">${rank.boy}</td>
                                                    <td class="py-4 px-4 text-gray-600">${rank.girl}</td>
                                                </tr>
                                            ` : '').join('')}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    `;
                }
            })
            .catch(err => {
                document.getElementById('criteria-container').innerHTML = '<p class="text-red-500 text-center">載入失敗，請確認網路連線或 Spreadsheet 發佈設定。</p>';
            });
    </script>
</body>
</html>
