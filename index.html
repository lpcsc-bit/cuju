<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>最新資訊 - 聖公會李炳中學體育科</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .liping-blue { background-color: #003366; }
        .liping-border { border-color: #d32f2f; }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <nav class="liping-blue text-white shadow-xl sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center">
            <div class="flex items-center gap-3 mb-4 md:mb-0">
                <div class="bg-white p-1 rounded-full text-blue-900 font-bold w-10 h-10 flex items-center justify-center">LP</div>
                <div>
                    <h1 class="text-lg font-bold leading-none">聖公會李炳中學</h1>
                    <p class="text-xs opacity-80 italic">體育科 PE Department</p>
                </div>
            </div>
            <ul class="flex space-x-6">
                <li><a href="index.html" class="font-bold border-b-2 border-white pb-1">最新資訊</a></li>
                <li><a href="resources.html" class="text-blue-200 hover:text-white transition">學習資源</a></li>
                <li><a href="criteria.html" class="text-blue-200 hover:text-white transition">考核準則</a></li>
                <li><a href="interactive.html" class="text-blue-200 hover:text-white transition">互動專區</a></li>
            </ul>
        </div>
    </nav>

    <header class="bg-white border-b-4 liping-border py-12 mb-10">
        <div class="container mx-auto px-4">
            <h2 class="text-3xl font-extrabold text-slate-800 tracking-tight">📢 最新資訊 <span class="text-blue-600">Latest News</span></h2>
            <p class="mt-2 text-slate-500">獲取校隊動態、比賽成績及體育科重要通知。</p>
        </div>
    </header>

    <main class="container mx-auto px-4 pb-20">
        <div id="news-container" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="col-span-full text-center py-10">
                <div class="animate-spin inline-block w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full mb-4"></div>
                <p class="text-gray-400">正在同步雲端資料...</p>
            </div>
        </div>
    </main>

    <footer class="bg-slate-800 text-white py-8">
        <div class="container mx-auto px-4 text-center">
            <p class="font-bold mb-2">聖公會李炳中學 S.K.H. Li Ping Secondary School</p>
            <p class="text-sm opacity-60">取生命的水喝 | I Seek, I Act</p>
        </div>
    </footer>

    <script>
        const SPREADSHEET_ID = '2PACX-1vS-_qE6XPHlEI2czLW37um9rnlWHC76xeYM9GTeDai2IWzHdS9LKW-iQVrxUKqhV0uxC4hzYvZXTChX';
        const url = `https://docs.google.com/spreadsheets/d/e/${SPREADSHEET_ID}/pub?gid=0&single=true&output=csv`;

        fetch(url)
            .then(res => res.text())
            .then(csvText => {
                const container = document.getElementById('news-container');
                container.innerHTML = ''; 

                const lines = csvText.split('\n');
                if (lines.length <= 1) {
                    container.innerHTML = '<p class="col-span-full text-center text-gray-400">目前暫無最新資訊。</p>';
                    return;
                }

                for (let i = 1; i < lines.length; i++) {
                    if (lines[i].trim() === '') continue;
                    
                    // 使用安全的正則表達式切割 CSV，避免因為引號或逗號卡住 Loading
                    const columns = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); 
                    
                    const date = columns[0] ? columns[0].replace(/"/g, '') : '';
                    const category = columns[1] ? columns[1].replace(/"/g, '') : '消息';
                    const title = columns[2] ? columns[2].replace(/"/g, '') : '未命名標題';
                    const content = columns[3] ? columns[3].replace(/"/g, '') : '';

                    container.innerHTML += `
                        <div class="bg-white rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition p-6">
                            <div class="flex items-center gap-2 mb-4">
                                <span class="bg-blue-100 text-blue-700 text-xs font-bold px-2 py-1 rounded">${category}</span>
                                <span class="text-gray-400 text-sm italic">${date}</span>
                            </div>
                            <h3 class="text-xl font-bold text-gray-800 mb-3">${title}</h3>
                            <p class="text-gray-600 leading-relaxed">${content}</p>
                        </div>
                    `;
                }
            })
            .catch(err => {
                document.getElementById('news-container').innerHTML = '<p class="text-red-500">載入失敗，請確認網路連線。</p>';
            });
    </script>
</body>
</html>
