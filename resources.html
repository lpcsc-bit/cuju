<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學習資源 - 體育科</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <nav class="bg-blue-600 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">🏆 體育科網頁</h1>
            <ul class="flex space-x-6">
                <li><a href="index.html" class="text-blue-100 hover:text-white transition">最新資訊</a></li>
                <li><a href="resources.html" class="font-bold border-b-2 border-white pb-1">學習資源</a></li>
            </ul>
        </div>
    </nav>

    <header class="bg-blue-50 py-12 border-b">
        <div class="container mx-auto px-4 text-center">
            <h2 class="text-4xl font-extrabold text-slate-800 mb-4">📚 學習資源庫</h2>
            <p class="text-slate-600 max-w-2xl mx-auto text-lg">這裡收集了各年級的體育知識、教學影片與複習材料，助你提升體育素養。</p>
        </div>
    </header>

    <main class="container mx-auto my-12 px-4">
        <div id="resources-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="col-span-full text-center py-20 text-slate-400">
                <i class="fa-solid fa-circle-notch fa-spin text-4xl mb-4"></i>
                <p>正在從雲端同步資源...</p>
            </div>
        </div>
    </main>

    <script>
        // ======= ⚠️ 你的試算表 ID =======
        const SPREADSHEET_ID = '2PACX-1vS-_qE6XPHlEI2czLW37um9rnlWHC76xeYM9GTeDai2IWzHdS9LKW-iQVrxUKqhV0uxC4hzYvZXTChX';
        // ===============================

        // const url = `https://docs.google.com/spreadsheets/d/e/${SPREADSHEET_ID}/pub?output=csv&sheet=resources`;
        const url = `https://docs.google.com/spreadsheets/d/e/${SPREADSHEET_ID}/pub?gid=1298104869&single=true&output=csv`;
        

        fetch(url)
            .then(res => res.text())
            .then(csvText => {
                const grid = document.getElementById('resources-grid');
                grid.innerHTML = ''; 

                const lines = csvText.split('\n');
                if (lines.length <= 1) {
                    grid.innerHTML = '<div class="col-span-full text-center py-20 text-slate-400">目前暫無學習資源。</div>';
                    return;
                }

                for (let i = 1; i < lines.length; i++) {
                    if (lines[i].trim() === '') continue;

                    const columns = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); // 複雜的 CSV 分割法，防止內容有逗號
                    
                    const grade = columns[0] ? columns[0].replace(/"/g, '') : '全校';
                    const topic = columns[1] ? columns[1].replace(/"/g, '') : '未命名主題';
                    const link = columns[2] ? columns[2].replace(/"/g, '') : '#';
                    const photo = columns[3] ? columns[3].replace(/"/g, '') : 'https://placehold.co/600x400/e2e8f0/64748b?text=PE+Resource';

                    const cardHTML = `
                        <div class="bg-white rounded-2xl shadow-sm hover:shadow-xl transition-all duration-300 overflow-hidden group border border-slate-100 flex flex-col h-full">
                            <div class="relative h-48 overflow-hidden bg-slate-200">
                                <img src="${photo}" alt="${topic}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                                <div class="absolute top-4 left-4">
                                    <span class="bg-blue-600 text-white text-xs font-bold px-3 py-1.5 rounded-full shadow-lg italic">${grade}</span>
                                </div>
                            </div>
                            <div class="p-6 flex flex-col flex-grow">
                                <h3 class="text-xl font-bold text-slate-800 mb-3 line-clamp-2">${topic}</h3>
                                <div class="mt-auto pt-4">
                                    <a href="${link}" target="_blank" class="inline-flex items-center justify-center w-full bg-slate-800 hover:bg-blue-600 text-white font-bold py-3 px-6 rounded-xl transition-colors gap-2">
                                        <i class="fa-solid fa-up-right-from-square text-sm"></i>
                                        立即查看資源
                                    </a>
                                </div>
                            </div>
                        </div>
                    `;
                    grid.innerHTML += cardHTML;
                }
            })
            .catch(err => {
                console.error(err);
                document.getElementById('resources-grid').innerHTML = '<p class="text-red-500 text-center col-span-full">載入失敗，請確認試算表分頁名稱是否為 resources。</p>';
            });
    </script>
</body>
</html>
