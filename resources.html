<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學習資源 - 聖公會李炳中學體育科</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .liping-blue { background-color: #003366; }
        .liping-border { border-color: #d32f2f; }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <nav class="liping-blue text-white shadow-xl sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center">
            <div class="flex items-center gap-3 mb-4 md:mb-0">
                <div class="bg-white p-1 rounded-full text-blue-900 font-bold w-10 h-10 flex items-center justify-center">LP</div>
                <div>
                    <h1 class="text-lg font-bold leading-none">聖公會李炳中學</h1>
                    <p class="text-xs opacity-80 italic">體育科 PE Department</p>
                </div>
            </div>
            <ul class="flex space-x-8">
                <li><a href="index.html" class="text-blue-200 hover:text-white transition">最新資訊</a></li>
                <li><a href="resources.html" class="font-bold border-b-2 border-white pb-1">學習資源</a></li>
            </ul>
        </div>
    </nav>

    <header class="bg-white border-b-4 liping-border py-12 mb-10">
        <div class="container mx-auto px-4">
            <h2 class="text-3xl font-extrabold text-slate-800">📚 學習資源庫 <span class="text-blue-600">Learning Resources</span></h2>
            <p class="mt-2 text-slate-500">自主學習體育知識，豐富你的運動生活。</p>
        </div>
    </header>

    <main class="container mx-auto px-4 pb-20">
        <div id="resources-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="col-span-full text-center py-10">
                <div class="animate-spin inline-block w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full mb-4"></div>
                <p class="text-gray-400">正在同步雲端資源...</p>
            </div>
        </div>
    </main>

    <footer class="bg-slate-800 text-white py-8">
        <div class="container mx-auto px-4 text-center">
            <p class="font-bold mb-2">聖公會李炳中學 S.K.H. Li Ping Secondary School</p>
            <p class="text-sm opacity-60">取生命的水喝 | I Seek, I Act</p>
        </div>
    </footer>

    <script>
        const SPREADSHEET_ID = '2PACX-1vS-_qE6XPHlEI2czLW37um9rnlWHC76xeYM9GTeDai2IWzHdS9LKW-iQVrxUKqhV0uxC4hzYvZXTChX';
        // 已成功替換為你提供的專屬 GID
        const GID = '1298104869'; 

        const url = `https://docs.google.com/spreadsheets/d/e/${SPREADSHEET_ID}/pub?gid=${GID}&single=true&output=csv`;

        fetch(url)
            .then(res => res.text())
            .then(csvText => {
                const grid = document.getElementById('resources-grid');
                grid.innerHTML = '';

                const lines = csvText.split('\n');
                if (lines.length <= 1) {
                    grid.innerHTML = '<p class="col-span-full text-center text-gray-400">目前暫無學習資源。</p>';
                    return;
                }

                for (let i = 1; i < lines.length; i++) {
                    if (lines[i].trim() === '') continue;
                    const columns = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    
                    // 根據你的 Spreadsheet 欄位正確對應：A: grade, B: topic, C: link, D: photo
                    const grade = columns[0] ? columns[0].replace(/"/g, '') : '全校';
                    const topic = columns[1] ? columns[1].replace(/"/g, '') : '未命名主題';
                    const link = columns[2] ? columns[2].replace(/"/g, '') : '#';
                    const photo = columns[3] ? columns[3].replace(/"/g, '').trim() : 'https://images.unsplash.com/photo-1517649763962-0c623066013b?auto=format&fit=crop&w=600&q=80';

                    grid.innerHTML += `
                        <div class="bg-white rounded-2xl shadow-sm hover:shadow-lg transition-all overflow-hidden flex flex-col h-full border border-gray-100">
                            <div class="h-44 bg-gray-200">
                                <img src="${photo}" class="w-full h-full object-cover" onerror="this.src='https://images.unsplash.com/photo-1517649763962-0c623066013b?auto=format&fit=crop&w=600&q=80'">
                            </div>
                            <div class="p-6 flex flex-col flex-grow">
                                <div class="mb-2"><span class="bg-blue-50 text-blue-700 text-xs font-bold px-2 py-1 rounded shadow-sm">${grade}</span></div>
                                <h3 class="text-lg font-bold text-gray-800 mb-4">${topic}</h3>
                                <div class="mt-auto">
                                    <a href="${link}" target="_blank" class="block text-center bg-blue-900 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition">
                                        開啟資源 <i class="fa-solid fa-arrow-up-right-from-square ml-1 text-xs"></i>
                                    </a>
                                </div>
                            </div>
                        </div>
                    `;
                }
            })
            .catch(err => {
                document.getElementById('resources-grid').innerHTML = '<p class="text-red-500 text-center col-span-full">載入失敗，請確認網路連線。</p>';
            });
    </script>
</body>
</html>
